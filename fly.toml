# Configuration Fly.io — région Johannesburg (la plus proche du Bénin).
app = "beninplay-api"
primary_region = "jnb"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"  # 1 Go : minimum viable pour ffmpeg (au-delà du free)
